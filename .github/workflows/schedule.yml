name: Run Weather Monitor
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run weather monitor
        run: python Runwayviz.py
        env:
          CHECKWX_API_KEY: ${{ secrets.CHECKWX_API_KEY }}
      - name: Send email report
        run: python sendalert.py
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      
      - name: Commit and push report
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add latest_report.txt
          git diff --staged --quiet || git commit -m "Auto-update report $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
