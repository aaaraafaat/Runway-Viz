<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Runway Viz – Pilot Dashboard</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0a0f1e;
            color: #e2e8f0;
        }
        .dashboard {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
        }
        .left-panel { flex: 2; min-width: 360px; }
        .right-panel { flex: 1.2; min-width: 300px; }
        .card {
            background: #1e293b;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            border: 1px solid #334155;
        }
        .card h3 {
            margin-top: 0;
            color: #facc15;
            border-left: 4px solid #facc15;
            padding-left: 12px;
        }
        .airfield {
            background: #0f172a;
            border-left: 4px solid #475569;
            margin-bottom: 16px;
            padding: 16px;
            border-radius: 16px;
            cursor: pointer;
            transition: 0.2s;
        }
        .airfield:hover { background: #1e293b; }
        .airfield.unsafe { border-left-color: #ef4444; }
        .airfield.safe { border-left-color: #22c55e; }
        .airfield-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
        }
        .icao-code {
            font-weight: bold;
            font-size: 1.4rem;
            color: #facc15;
        }
        .wind-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 40px;
        }
        .windsock { font-size: 1.2rem; }
        .windsock.green { color: #22c55e; }
        .windsock.yellow { color: #eab308; }
        .windsock.red { color: #ef4444; }
        .badge { font-size: 0.75rem; padding: 2px 8px; border-radius: 20px; background: #334155; }
        .badge.ts { background: #b91c1c; color: white; }
        button {
            background: #3b82f6;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #2563eb; }
        .aircraft-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 12px;
        }
        .aircraft-card {
            background: #0f172a;
            border-radius: 16px;
            padding: 12px;
            flex: 1;
            min-width: 140px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #334155;
        }
        .aircraft-card.selected {
            border: 2px solid #facc15;
            background: #1e293b;
        }
        .aircraft-name {
            font-weight: bold;
            font-size: 1.1rem;
        }
        .aircraft-limits {
            font-size: 0.75rem;
            margin-top: 8px;
            color: #94a3b8;
        }
        .runway-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }
        .runway-svg {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            max-width: 100%;
            height: auto;
        }
        .add-form {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }
        .add-form input { flex: 1; min-width: 70px; padding: 8px; border-radius: 8px; background: #0f172a; border: 1px solid #334155; color: white; }
        .small-text { font-size: 0.75rem; color: #94a3b8; margin-top: 8px; }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #facc15;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            color: #1e293b;
        }
        .info-panel {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-top: 16px;
            text-align: center;
        }
    </style>
</head>
<body class="dark">
    <button class="theme-toggle" id="themeToggle">🌞 Light mode</button>
    <h1>🛩️ Runway Viz – Pilot Dashboard</h1>
    <div class="dashboard">
        <div class="left-panel">
            <div class="card">
                <h3>📡 Airfield Weather & Alerts</h3>
                <div id="airfieldsList">Loading weather data...</div>
                <div style="margin-top: 16px;">
                    <button id="addAirfieldBtn">➕ Add Airfield</button>
                    <button id="refreshWeatherBtn">🔄 Refresh</button>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <div class="card">
                <h3>✈️ Aircraft Profiles</h3>
                <div id="aircraftList" class="aircraft-grid"></div>
                <hr>
                <h4>➕ Add New Aircraft</h4>
                <div class="add-form">
                    <input type="text" id="acName" placeholder="Name">
                    <input type="number" id="acCross" placeholder="Xwind max">
                    <input type="number" id="acHead" placeholder="Headwind max">
                    <input type="number" id="acTail" placeholder="Tailwind max">
                    <input type="number" id="acVis" placeholder="Min vis (mi)">
                    <label><input type="checkbox" id="acThunder"> Avoid TS</label>
                    <button id="addAircraftBtn">Add</button>
                </div>
                <div class="small-text">Click on aircraft to edit/delete</div>
            </div>
            <div class="card">
                <h3>🛬 Runway & Wind</h3>
                <div id="runwayVisual" class="runway-container"></div>
                <div id="extraAirfieldInfo" class="info-panel"></div>
            </div>
            <div class="card">
                <h3>🗺️ Airfield Editor</h3>
                <div id="airfieldEditorList"></div>
                <div class="small-text">Edit runway heading to see orientation change.</div>
            </div>
        </div>
    </div>
    <script>
        // Theme toggle
        const themeToggle = document.getElementById('themeToggle');
        function setTheme(theme) {
            document.body.classList.remove('dark', 'light');
            document.body.classList.add(theme);
            localStorage.setItem('runwayviz_theme', theme);
            themeToggle.textContent = theme === 'dark' ? '🌞 Light mode' : '🌙 Dark mode';
        }
        const savedTheme = localStorage.getItem('runwayviz_theme') || 'dark';
        setTheme(savedTheme);
        themeToggle.addEventListener('click', () => {
            const newTheme = document.body.classList.contains('dark') ? 'light' : 'dark';
            setTheme(newTheme);
        });

        // Data stores
        let aircraftList = [];
        let airfieldConfigs = [];
        let currentWeather = { airfields: {} };
        let selectedAirfieldIcao = null;

        const WEATHER_RAW_URL = "https://raw.githubusercontent.com/aaaraafaat/Runway-Viz/main/latest_report.txt";
        const DEFAULT_AIRCRAFT = [
            { name: "Cessna 152", max_crosswind: 12, max_headwind: 20, max_tailwind: 10, min_visibility: 3, avoid_thunderstorm: true },
            { name: "Cessna 172", max_crosswind: 15, max_headwind: 25, max_tailwind: 12, min_visibility: 3, avoid_thunderstorm: true },
            { name: "Piper Seneca", max_crosswind: 20, max_headwind: 30, max_tailwind: 15, min_visibility: 2, avoid_thunderstorm: false }
        ];
        const DEFAULT_AIRFIELDS = [
            { icao: "VGHS", runway_heading: 140 },
            { icao: "VGEG", runway_heading: 160 }
        ];

        function loadData() {
            const storedAircraft = localStorage.getItem("runwayviz_aircraft");
            aircraftList = storedAircraft ? JSON.parse(storedAircraft) : [...DEFAULT_AIRCRAFT];
            const storedAirfields = localStorage.getItem("runwayviz_airfields");
            airfieldConfigs = storedAirfields ? JSON.parse(storedAirfields) : [...DEFAULT_AIRFIELDS];
        }
        function saveAircraft() { localStorage.setItem("runwayviz_aircraft", JSON.stringify(aircraftList)); }
        function saveAirfields() { localStorage.setItem("runwayviz_airfields", JSON.stringify(airfieldConfigs)); }

        function parseWeatherFromReport(text) {
            const lines = text.split(/\r?\n/);
            let airfields = {};
            let currentICAO = null;
            let currentWind = null, currentVis = null, currentRaw = "", hasTS = false;
            let currentTemp = null, currentQnh = null, currentDew = null;
            for (let line of lines) {
                const match = line.match(/^([A-Z]{4}):/);
                if (match) {
                    if (currentICAO) {
                        airfields[currentICAO] = { 
                            wind_speed: currentWind?.speed, wind_dir: currentWind?.dir, 
                            visibility: currentVis, metar_raw: currentRaw, has_thunderstorm: hasTS,
                            temperature: currentTemp, qnh: currentQnh, dewpoint: currentDew
                        };
                    }
                    currentICAO = match[1];
                    currentWind = null; currentVis = null; currentRaw = ""; hasTS = false;
                    currentTemp = null; currentQnh = null; currentDew = null;
                } else if (currentICAO) {
                    if (line.includes("Wind:")) {
                        const spdMatch = line.match(/Wind:\s*(\d+(?:\.\d+)?)\s*kts/);
                        const dirMatch = line.match(/(\d{3})°/);
                        if (spdMatch) currentWind = { speed: parseFloat(spdMatch[1]), dir: dirMatch ? parseInt(dirMatch[1]) : null };
                    }
                    if (line.includes("Vis:")) {
                        const visMatch = line.match(/Vis:\s*(\d+(?:\.\d+)?)\s*mi/);
                        if (visMatch) currentVis = parseFloat(visMatch[1]);
                    }
                    if (line.includes("Raw:")) {
                        const rawMatch = line.match(/Raw:\s*(.*)/);
                        if (rawMatch) currentRaw = rawMatch[1];
                        const metarWind = currentRaw.match(/(\d{3})(\d{2})KT/);
                        if (metarWind && currentWind) {
                            currentWind.dir = parseInt(metarWind[1]);
                            currentWind.speed = parseInt(metarWind[2]);
                        }
                        if (currentRaw.includes("TS") || currentRaw.includes("TSRA")) hasTS = true;
                        const tempMatch = currentRaw.match(/(\d{2})\/(\d{2})/);
                        if (tempMatch) {
                            currentTemp = parseInt(tempMatch[1]);
                            currentDew = parseInt(tempMatch[2]);
                        }
                        const qnhMatch = currentRaw.match(/Q(\d{4})/);
                        if (qnhMatch) currentQnh = parseInt(qnhMatch[1]);
                    }
                    if (line.includes("Temp:")) {
                        const tempMatch = line.match(/Temp:\s*(\d+)°C/);
                        if (tempMatch) currentTemp = parseInt(tempMatch[1]);
                    }
                    if (line.includes("QNH:")) {
                        const qnhMatch = line.match(/QNH:\s*(\d+)\s*hPa/);
                        if (qnhMatch) currentQnh = parseInt(qnhMatch[1]);
                    }
                }
            }
            if (currentICAO) {
                airfields[currentICAO] = { 
                    wind_speed: currentWind?.speed, wind_dir: currentWind?.dir, 
                    visibility: currentVis, metar_raw: currentRaw, has_thunderstorm: hasTS,
                    temperature: currentTemp, qnh: currentQnh, dewpoint: currentDew
                };
            }
            return airfields;
        }

        function computeWindComponents(windDir, windSpeed, runwayHeading) {
            if (!windDir || !runwayHeading) return { headwind: null, crosswind: null, tailwind: null };
            let angleDiff = Math.abs(windDir - runwayHeading);
            if (angleDiff > 180) angleDiff = 360 - angleDiff;
            const headwind = windSpeed * Math.cos(angleDiff * Math.PI / 180);
            const crosswind = windSpeed * Math.sin(angleDiff * Math.PI / 180);
            const tailwind = headwind < 0 ? -headwind : 0;
            const effectiveHeadwind = headwind > 0 ? headwind : 0;
            return { headwind: Math.abs(effectiveHeadwind), crosswind: Math.abs(crosswind), tailwind: tailwind };
        }

        function isAircraftSafe(aircraft, wx, runwayHeading) {
            if (!wx || wx.wind_speed === undefined || wx.visibility === undefined) return null;
            if (aircraft.avoid_thunderstorm && wx.has_thunderstorm) return false;
            if (wx.visibility < aircraft.min_visibility) return false;
            const comp = computeWindComponents(wx.wind_dir, wx.wind_speed, runwayHeading);
            if (comp.headwind === null) return null;
            if (comp.crosswind > aircraft.max_crosswind) return false;
            if (comp.headwind > aircraft.max_headwind) return false;
            if (comp.tailwind > aircraft.max_tailwind) return false;
            return true;
        }

        function renderAirfields() {
            const container = document.getElementById("airfieldsList");
            if (!currentWeather.airfields || Object.keys(currentWeather.airfields).length === 0) {
                container.innerHTML = "<div>No weather data. Run GitHub Action first.</div>";
                return;
            }
            let html = "";
            for (let config of airfieldConfigs) {
                const icao = config.icao;
                const wx = currentWeather.airfields[icao];
                if (!wx) {
                    html += `<div class="airfield" onclick="selectAirfield('${icao}')"><div class="airfield-header"><span class="icao-code">${icao}</span><span class="badge">No data</span></div></div>`;
                    continue;
                }
                const windSpeed = wx.wind_speed ?? 0;
                let windsockColor = "green";
                if (windSpeed > 15) windsockColor = "red";
                else if (windSpeed > 5) windsockColor = "yellow";
                const rwyHeading = config.runway_heading;
                let anyUnsafe = false;
                for (let ac of aircraftList) {
                    if (isAircraftSafe(ac, wx, rwyHeading) === false) { anyUnsafe = true; break; }
                }
                const overallClass = anyUnsafe ? "unsafe" : "safe";
                html += `<div class="airfield ${overallClass}" onclick="selectAirfield('${icao}')">
                            <div class="airfield-header">
                                <span class="icao-code">${icao}</span>
                                <div class="wind-indicator">
                                    <span class="windsock ${windsockColor}">🧦</span>
                                    <span>${windSpeed} kts</span>
                                    ${wx.wind_dir ? `<span>${wx.wind_dir}°</span>` : ""}
                                </div>
                            </div>
                            <div>Visibility: ${wx.visibility ?? "?"} mi</div>
                            ${wx.has_thunderstorm ? '<div><span class="badge ts">⛈️ Thunderstorm</span></div>' : ""}
                            <div class="small-text">Temp: ${wx.temperature ?? "?"}°C | QNH: ${wx.qnh ?? "?"} hPa</div>
                            <div class="small-text">Runway heading: ${rwyHeading}°</div>
                        </div>`;
            }
            container.innerHTML = html;
        }

        window.selectAirfield = function(icao) {
            selectedAirfieldIcao = icao;
            renderRunwayVisual();
            renderAircraftSuitability();
        };

        function renderRunwayVisual() {
            const container = document.getElementById("runwayVisual");
            const infoDiv = document.getElementById("extraAirfieldInfo");
            if (!selectedAirfieldIcao) {
                container.innerHTML = "<div class='small-text'>Select an airfield to see runway</div>";
                infoDiv.innerHTML = "";
                return;
            }
            const config = airfieldConfigs.find(c => c.icao === selectedAirfieldIcao);
            if (!config) return;
            const heading = config.runway_heading;
            const wx = currentWeather.airfields[selectedAirfieldIcao];
            const windDir = wx?.wind_dir;
            const windSpeed = wx?.wind_speed;
            const svgSize = 200;
            const center = svgSize/2;
            const runwayLength = 120;
            const runwayWidth = 30;
            // Rotate runway
            const rad = heading * Math.PI/180;
            const x1 = center - (runwayLength/2) * Math.cos(rad);
            const y1 = center - (runwayLength/2) * Math.sin(rad);
            const x2 = center + (runwayLength/2) * Math.cos(rad);
            const y2 = center + (runwayLength/2) * Math.sin(rad);
            // Threshold markings
            const thresholdLength = 10;
            const thresholdWidth = 20;
            const t1x = x1 - thresholdLength * Math.cos(rad);
            const t1y = y1 - thresholdLength * Math.sin(rad);
            const t2x = x2 + thresholdLength * Math.cos(rad);
            const t2y = y2 + thresholdLength * Math.sin(rad);
            
            let windArrow = "";
            if (windDir !== undefined && windDir !== null) {
                const arrowRad = (windDir) * Math.PI/180;
                const arrowLength = 70;
                const arrowEndX = center + arrowLength * Math.cos(arrowRad);
                const arrowEndY = center + arrowLength * Math.sin(arrowRad);
                windArrow = `<line x1="${center}" y1="${center}" x2="${arrowEndX}" y2="${arrowEndY}" stroke="#facc15" stroke-width="3" marker-end="url(#arrow)"/>`;
            }
            
            const svg = `<svg width="${svgSize}" height="${svgSize}" viewBox="0 0 ${svgSize} ${svgSize}" class="runway-svg">
                            <defs>
                                <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
                                    <path d="M0,0 L10,5 L0,10 Z" fill="#facc15"/>
                                </marker>
                            </defs>
                            <circle cx="${center}" cy="${center}" r="90" stroke="#475569" stroke-width="1" fill="none"/>
                            <line x1="${center}" y1="10" x2="${center}" y2="${svgSize-10}" stroke="#334155" stroke-width="1" stroke-dasharray="4,4"/>
                            <text x="${center}" y="25" fill="#facc15" font-size="12" text-anchor="middle">N</text>
                            <rect x="${center-runwayWidth/2}" y="${center-runwayLength/2}" width="${runwayWidth}" height="${runwayLength}" fill="#334155" transform="rotate(${heading} ${center} ${center})" rx="4"/>
                            <rect x="${center-thresholdWidth/2}" y="${center-runwayLength/2 - thresholdLength}" width="${thresholdWidth}" height="${thresholdLength}" fill="#facc15" transform="rotate(${heading} ${center} ${center})"/>
                            <rect x="${center-thresholdWidth/2}" y="${center+runwayLength/2}" width="${thresholdWidth}" height="${thresholdLength}" fill="#facc15" transform="rotate(${heading} ${center} ${center})"/>
                            ${windArrow}
                        </svg>`;
            container.innerHTML = svg;
            let extraHtml = `<strong>${config.icao}</strong><br>Runway heading: ${heading}°<br>`;
            if (windDir !== undefined && windSpeed !== undefined) {
                extraHtml += `Wind: ${windSpeed} kts from ${windDir}°<br>`;
                const comp = computeWindComponents(windDir, windSpeed, heading);
                if (comp.headwind !== null) {
                    extraHtml += `Headwind: ${comp.headwind.toFixed(1)} kts | Crosswind: ${comp.crosswind.toFixed(1)} kts | Tailwind: ${comp.tailwind.toFixed(1)} kts<br>`;
                }
            }
            if (wx?.temperature) extraHtml += `Temp: ${wx.temperature}°C | QNH: ${wx.qnh} hPa<br>`;
            infoDiv.innerHTML = extraHtml;
        }

        function renderAircraftList() {
            const container = document.getElementById("aircraftList");
            let html = "";
            aircraftList.forEach((ac, idx) => {
                html += `<div class="aircraft-card" onclick="editAircraft(${idx})">
                            <div class="aircraft-name">${ac.name}</div>
                            <div class="aircraft-limits">
                                XW:${ac.max_crosswind} | HW:${ac.max_headwind}<br>
                                TW:${ac.max_tailwind} | VIS:${ac.min_visibility}mi
                                ${ac.avoid_thunderstorm ? "⛈️" : ""}
                            </div>
                        </div>`;
            });
            container.innerHTML = html;
        }

        function renderAircraftSuitability() {
            if (!selectedAirfieldIcao) return;
            const wx = currentWeather.airfields[selectedAirfieldIcao];
            const config = airfieldConfigs.find(c => c.icao === selectedAirfieldIcao);
            if (!wx || !config) return;
            const infoDiv = document.getElementById("extraAirfieldInfo");
            let suitabilityHtml = "<div class='small-text'><strong>Aircraft Suitability</strong><br>";
            for (let ac of aircraftList) {
                const safe = isAircraftSafe(ac, wx, config.runway_heading);
                const status = safe ? "✅ SAFE" : (safe === false ? "❌ UNSAFE" : "⚠️ No data");
                suitabilityHtml += `${ac.name}: ${status}<br>`;
            }
            suitabilityHtml += "</div>";
            infoDiv.innerHTML += suitabilityHtml;
        }

        window.editAircraft = function(idx) {
            const ac = aircraftList[idx];
            const newName = prompt("Aircraft name", ac.name);
            if (!newName) return;
            const newCross = parseFloat(prompt("Max crosswind (kts)", ac.max_crosswind));
            const newHead = parseFloat(prompt("Max headwind (kts)", ac.max_headwind));
            const newTail = parseFloat(prompt("Max tailwind (kts)", ac.max_tailwind));
            const newVis = parseFloat(prompt("Min visibility (miles)", ac.min_visibility));
            const newThunder = confirm("Avoid thunderstorms? (OK = yes)");
            if (isNaN(newCross) || isNaN(newHead) || isNaN(newTail) || isNaN(newVis)) return;
            aircraftList[idx] = { name: newName, max_crosswind: newCross, max_headwind: newHead, max_tailwind: newTail, min_visibility: newVis, avoid_thunderstorm: newThunder };
            saveAircraft();
            renderAircraftList();
            renderAirfields();
            if (selectedAirfieldIcao) renderRunwayVisual();
        };
        window.deleteAircraft = function(idx) {
            if (confirm(`Delete ${aircraftList[idx].name}?`)) {
                aircraftList.splice(idx, 1);
                saveAircraft();
                renderAircraftList();
                renderAirfields();
                if (selectedAirfieldIcao) renderRunwayVisual();
            }
        };

        document.getElementById("addAircraftBtn").addEventListener("click", () => {
            const name = document.getElementById("acName").value.trim();
            if (!name) return;
            const max_crosswind = parseFloat(document.getElementById("acCross").value);
            const max_headwind = parseFloat(document.getElementById("acHead").value);
            const max_tailwind = parseFloat(document.getElementById("acTail").value);
            const min_visibility = parseFloat(document.getElementById("acVis").value);
            const avoid_thunderstorm = document.getElementById("acThunder").checked;
            if (isNaN(max_crosswind) || isNaN(max_headwind) || isNaN(max_tailwind) || isNaN(min_visibility)) {
                alert("Fill all numeric fields");
                return;
            }
            aircraftList.push({ name, max_crosswind, max_headwind, max_tailwind, min_visibility, avoid_thunderstorm });
            saveAircraft();
            renderAircraftList();
            document.getElementById("acName").value = "";
            document.getElementById("acCross").value = "";
            document.getElementById("acHead").value = "";
            document.getElementById("acTail").value = "";
            document.getElementById("acVis").value = "";
            document.getElementById("acThunder").checked = false;
            renderAirfields();
        });

        function renderAirfieldEditor() {
            const container = document.getElementById("airfieldEditorList");
            let html = "";
            airfieldConfigs.forEach((cfg, idx) => {
                html += `<div style="display:flex; justify-content:space-between; align-items:center; margin:8px 0; background:#0f172a; padding:8px; border-radius:8px;">
                            <span><strong>${cfg.icao}</strong> | Heading: ${cfg.runway_heading}°</span>
                            <div>
                                <button onclick="editAirfield(${idx})">Edit</button>
                                <button class="danger" onclick="deleteAirfield(${idx})">Delete</button>
                            </div>
                        </div>`;
            });
            container.innerHTML = html;
        }
        window.editAirfield = function(idx) {
            const cfg = airfieldConfigs[idx];
            const newIcao = prompt("ICAO code (4 letters)", cfg.icao)?.toUpperCase();
            if (!newIcao) return;
            const newHeading = parseFloat(prompt("Runway heading (0-359)", cfg.runway_heading));
            if (isNaN(newHeading)) return;
            airfieldConfigs[idx] = { icao: newIcao, runway_heading: newHeading };
            saveAirfields();
            renderAirfieldEditor();
            renderAirfields();
            if (selectedAirfieldIcao === cfg.icao) {
                selectedAirfieldIcao = newIcao;
                renderRunwayVisual();
            }
        };
        window.deleteAirfield = function(idx) {
            if (confirm(`Delete ${airfieldConfigs[idx].icao}?`)) {
                airfieldConfigs.splice(idx, 1);
                saveAirfields();
                renderAirfieldEditor();
                renderAirfields();
                if (selectedAirfieldIcao === airfieldConfigs[idx]?.icao) selectedAirfieldIcao = null;
                renderRunwayVisual();
            }
        };
        document.getElementById("addAirfieldBtn").addEventListener("click", () => {
            const newIcao = prompt("Enter ICAO code (e.g., VGHS)")?.toUpperCase();
            if (!newIcao) return;
            const newHeading = parseFloat(prompt("Runway heading (0-359)", 0));
            if (isNaN(newHeading)) return;
            airfieldConfigs.push({ icao: newIcao, runway_heading: newHeading });
            saveAirfields();
            renderAirfieldEditor();
            renderAirfields();
        });

        async function loadWeather() {
            try {
                const res = await fetch(WEATHER_RAW_URL + "?t=" + Date.now());
                if (!res.ok) throw new Error("HTTP " + res.status);
                const text = await res.text();
                currentWeather.airfields = parseWeatherFromReport(text);
                renderAirfields();
                if (selectedAirfieldIcao) {
                    renderRunwayVisual();
                }
            } catch(e) {
                document.getElementById("airfieldsList").innerHTML = `<div style="color:red">Weather fetch failed: ${e.message}</div>`;
            }
        }
        document.getElementById("refreshWeatherBtn").addEventListener("click", loadWeather);

        function init() {
            loadData();
            renderAirfieldEditor();
            renderAircraftList();
            loadWeather();
            setInterval(loadWeather, 300000);
        }
        init();
    </script>
</body>
</html>
